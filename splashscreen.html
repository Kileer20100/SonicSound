<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #080810; overflow: hidden; }

    #container { 
        width: 100vw; height: 100vh; position: relative;
        display: flex; justify-content: center; align-items: center;
        background-color: #080810;
    }

    .wave {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        clip-path: circle(0% at 0% 0%);
    }
    
    .wave.animate {
        transition: clip-path 1.4s cubic-bezier(0.1, 0.8, 0.25, 1);
    }

    .brand-container {
        position: relative;
        font-family: 'Arial Black', sans-serif;
        font-size: 10vw; font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.02em;
        color: #FFFFFF; 
        z-index: 99999; 
        white-space: nowrap;
        user-select: none;
        mix-blend-mode: exclusion;
    }
</style>
</head>
<body>

<div id="container">
    <div id="wave1" class="wave"></div>
    <div id="wave2" class="wave"></div>
    
    <div class="brand-container">SONICSOUND</div>
</div>

<script>
    const colors = [
        '#3B82F6',
        '#EF4444',
        '#10B981',
        '#8B5CF6',
        '#F59E0B'
    ];
    
    const w1 = document.getElementById('wave1');
    const w2 = document.getElementById('wave2');
    
    let idx = 0;
    let useW1 = true;
    let topZIndex = 1;

    const corners = ["0% 0%", "100% 0%", "100% 100%", "0% 100%"];
    let cornerIdx = 0;

    function nextWave() {
        const color = colors[idx];
        const currentWave = useW1 ? w1 : w2;

        currentWave.classList.remove('animate');
        
        const startPoint = corners[cornerIdx];
        currentWave.style.clipPath = `circle(0% at ${startPoint})`;
        currentWave.style.backgroundColor = color;

        topZIndex++;
        currentWave.style.zIndex = topZIndex;

        currentWave.offsetWidth; 

        currentWave.classList.add('animate');
        currentWave.style.clipPath = `circle(150% at ${startPoint})`;

        idx = (idx + 1) % colors.length;
        cornerIdx = (cornerIdx + 1) % corners.length;
        useW1 = !useW1;

        setTimeout(nextWave, 800); 
    }

    nextWave();
</script>
</body>
</html>
